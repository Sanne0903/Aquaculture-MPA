<!DOCTYPE html>
<html>
<head>
  <title>Aquaculture Map  </title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Overlay caption for context -->
  <div style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.65); color: #fff; padding: 20px; font-size: 30px; line-height: 1.4; border-radius: 8px; max-width: 90%; z-index: 1000;">
    <strong>Detection of marine aquaculture installations</strong><br>
    Extracted from Sentinel-1 SAR imagery using iDPolRAD algorithm <br>
    Mediterranean Sea, July–September 2024<br>
    <em>Rouing, 2025 – MSc Thesis, Wageningen University</em>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([35.5, 18], 5);

    // Satellite basemap + attribution (includes MPA citation)
    L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        attribution:
          'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics, GIS User Community | ' +
          'MPAs: MAPAMED (2019 ed., v2) © 2022 SPA/RAC & MedPAN (CC BY-NC-SA 4.0)'
      }
    ).addTo(map);

    // -------- Aquaculture detections layer --------
    let aquacultureLayer;

    fetch('Aquaculture.geojson')
      .then(r => r.json())
      .then(data => {
        aquacultureLayer = L.geoJSON(data, {
          style: {
            color: 'white',
            weight: 1,
            fillOpacity: 0.4
          }
        }).addTo(map);

        // Fit to detections initially (or use combined bounds below)
        map.fitBounds(aquacultureLayer.getBounds());
      })
      .catch(err => console.error('Error loading Aquaculture.geojson:', err));

    // -------- MPA layer (grey, transparent) --------
    let mpaLayer;

    fetch('MPA.geojson')
      .then(r => r.json())
      .then(data => {
        mpaLayer = L.geoJSON(data, {
          style: {
            color: '#808080',      // grey outline
            weight: 1,
            fillColor: '#808080',  // grey fill
            fillOpacity: 0.25      // transparent fill
          }
        }).addTo(map);
      })
      .catch(err => console.error('Error loading MPA.geojson:', err));

  </script>
</body>

</html>
